# systemd drop-in override — WB SPLINTER (wb/main branch)
#
# This file overrides specific properties of polymarket-weather.service to point
# the bot at the splinter release path (/opt/polymarket-ai-v2-weather) instead
# of master's path (/opt/polymarket-ai-v2). It is installed to:
#   /etc/systemd/system/polymarket-weather.service.d/00-splinter.conf
#
# Standard systemd drop-in semantics: loaded ON TOP of the main service file
# at /etc/systemd/system/polymarket-weather.service, regardless of what's in
# the main file. So when master's deploy.sh re-installs its own
# polymarket-weather.service (pointing at /opt/polymarket-ai-v2), this override
# still wins — WB stays on the splinter.
#
# The empty `ExecStart=` line clears the inherited value before setting the
# new one (systemd's drop-in semantic for list-valued options).

[Service]
WorkingDirectory=/opt/polymarket-ai-v2-weather
ExecStart=
ExecStart=/opt/polymarket-ai-v2-weather/venv/bin/python main.py
