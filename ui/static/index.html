<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket AI Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --green: #3fb950;
    --red: #f85149; --blue: #58a6ff; --yellow: #d29922;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }
  .container { max-width: 1280px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .meta { color: var(--muted); font-size: 12px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; background: var(--surface); border-radius: 8px; padding: 4px; }
  .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; border: none; background: none; }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--border); color: var(--text); font-weight: 600; }

  /* Cards */
  .grid { display: grid; gap: 12px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card .value { font-size: 24px; font-weight: 700; }
  .card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Bot cards */
  .bot-card { position: relative; }
  .bot-card .status { position: absolute; top: 16px; right: 16px; width: 8px; height: 8px; border-radius: 50%; }
  .bot-card .status.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .bot-card .status.off { background: var(--muted); }
  .bot-card .bot-name { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .bot-card .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .bot-card .stat-row .label { color: var(--muted); }

  /* P&L colors */
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 8px; border-bottom: 1px solid var(--border); }
  tr:hover { background: rgba(255,255,255,0.02); }

  /* Progress bar */
  .bar-bg { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

  /* Section */
  .section { margin-bottom: 24px; }
  .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 12px; }

  /* Window table */
  .window-grid { display: grid; grid-template-columns: 140px repeat(4, 1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
  .window-cell { background: var(--surface); padding: 10px 12px; font-size: 13px; }
  .window-cell.header { font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; }
  .window-cell.bot-label { font-weight: 600; }
  .window-cell.total { background: #1c2129; font-weight: 600; }

  /* View panels */
  .view { display: none; }
  .view.active { display: block; }

  /* Snapshot compare */
  .compare-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .compare-controls input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
  .compare-controls button { background: var(--blue); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .compare-controls button:hover { opacity: 0.9; }
  .preset-btn { background: var(--surface) !important; color: var(--muted) !important; border: 1px solid var(--border) !important; font-size: 12px !important; padding: 4px 10px !important; }
  .preset-btn:hover { color: var(--text) !important; }

  /* Badge */
  .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.entry { background: rgba(88,166,255,0.15); color: var(--blue); }
  .badge.exit { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge.resolution { background: rgba(139,148,158,0.15); color: var(--muted); }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--muted); }

  /* Responsive */
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .window-grid { grid-template-columns: 100px repeat(4, 1fr); }
  }
  @media (max-width: 600px) {
    .grid-4 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Polymarket AI</h1>
    <div class="meta" id="last-updated">Loading...</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="command">Command Center</button>
    <button class="tab" data-view="positions">Positions</button>
    <button class="tab" data-view="trades">Trade Feed</button>
    <button class="tab" data-view="risk">Risk</button>
    <button class="tab" data-view="compare">Snapshot Compare</button>
  </div>

  <!-- ═══ COMMAND CENTER ═══ -->
  <div class="view active" id="view-command">
    <!-- System totals -->
    <div class="grid grid-4 section" id="system-cards"></div>

    <!-- Bot cards -->
    <div class="section-title">Bots</div>
    <div class="grid grid-4 section" id="bot-cards"></div>

    <!-- P&L Windows -->
    <div class="section-title">Realized P&L by Window</div>
    <div class="section" id="pnl-windows"></div>

    <!-- Entries Windows -->
    <div class="section-title">New Entries by Window</div>
    <div class="section" id="entry-windows"></div>
  </div>

  <!-- ═══ POSITIONS ═══ -->
  <div class="view" id="view-positions">
    <div class="section">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="preset-btn pos-filter active" data-bot="">All Bots</button>
        <button class="preset-btn pos-filter" data-bot="MirrorBot">Mirror</button>
        <button class="preset-btn pos-filter" data-bot="WeatherBot">Weather</button>
        <button class="preset-btn pos-filter" data-bot="EsportsBot">Esports</button>
      </div>
      <div class="card" id="positions-table"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- ═══ TRADE FEED ═══ -->
  <div class="view" id="view-trades">
    <div class="section">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="preset-btn trade-filter active" data-bot="">All Bots</button>
        <button class="preset-btn trade-filter" data-bot="MirrorBot">Mirror</button>
        <button class="preset-btn trade-filter" data-bot="WeatherBot">Weather</button>
        <button class="preset-btn trade-filter" data-bot="EsportsBot">Esports</button>
      </div>
      <div class="card" id="trades-table"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- ═══ RISK ═══ -->
  <div class="view" id="view-risk">
    <div class="grid grid-2 section">
      <div class="card" id="risk-by-bot"><div class="loading">Loading...</div></div>
      <div class="card" id="risk-by-cat"><div class="loading">Loading...</div></div>
    </div>
    <div class="section-title">Top Concentrated Markets</div>
    <div class="card section" id="risk-concentrated"><div class="loading">Loading...</div></div>
  </div>

  <!-- ═══ SNAPSHOT COMPARE ═══ -->
  <div class="view" id="view-compare">
    <div class="compare-controls">
      <label style="color:var(--muted)">From:</label>
      <input type="date" id="compare-start">
      <label style="color:var(--muted)">To:</label>
      <input type="date" id="compare-end">
      <button onclick="loadCompare()">Compare</button>
      <span style="color:var(--border)">|</span>
      <button class="preset-btn" onclick="setPreset('7d')">Last 7d</button>
      <button class="preset-btn" onclick="setPreset('30d')">Last 30d</button>
      <button class="preset-btn" onclick="setPreset('mtd')">MTD</button>
      <button class="preset-btn" onclick="setPreset('all')">All Time</button>
    </div>
    <div class="card section" id="compare-result"><div class="loading" style="color:var(--muted)">Select dates and click Compare</div></div>
  </div>
</div>

<script>
const API = '';  // same origin
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function pnlClass(v) { return v > 0 ? 'pos' : v < 0 ? 'neg' : ''; }
function fmt(v, decimals=2) { return v != null ? v.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals}) : '—'; }
function fmtPnl(v) { if (v == null) return '—'; const s = v >= 0 ? '+' : ''; return `<span class="${pnlClass(v)}">${s}$${fmt(Math.abs(v))}</span>`; }
function fmtTime(iso) { if (!iso) return '—'; const d = new Date(iso + 'Z'); return d.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}); }
function fmtDate(iso) { if (!iso) return '—'; return new Date(iso + 'Z').toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}); }
function truncQ(q, len=50) { return q && q.length > len ? q.slice(0, len) + '...' : (q || '—'); }

// ─── Tabs ───
$$('.tab').forEach(t => t.addEventListener('click', () => {
  $$('.tab').forEach(t2 => t2.classList.remove('active'));
  $$('.view').forEach(v => v.classList.remove('active'));
  t.classList.add('active');
  $(`#view-${t.dataset.view}`).classList.add('active');
  // lazy load
  if (t.dataset.view === 'positions') loadPositions();
  if (t.dataset.view === 'trades') loadTrades();
  if (t.dataset.view === 'risk') loadRisk();
}));

// ─── Command Center ───
async function loadCommand() {
  const [sumRes, winRes] = await Promise.all([
    fetch(`${API}/api/summary`).then(r => r.json()),
    fetch(`${API}/api/pnl_windows`).then(r => r.json()),
  ]);
  const sys = sumRes.system;

  // System cards
  $('#system-cards').innerHTML = `
    <div class="card"><h3>Total Equity</h3><div class="value">$${fmt(sys.equity)}</div><div class="sub">$${fmt(sys.capital)} capital</div></div>
    <div class="card"><h3>Realized P&L</h3><div class="value ${pnlClass(sys.realized)}">${fmtPnl(sys.realized)}</div><div class="sub">all-time</div></div>
    <div class="card"><h3>Unrealized</h3><div class="value ${pnlClass(sys.unrealized)}">${fmtPnl(sys.unrealized)}</div><div class="sub">${sys.positions} positions</div></div>
    <div class="card"><h3>Exposure</h3><div class="value">$${fmt(sys.deployed)}</div>
      <div class="sub">${sys.exposure_pct}% of $${fmt(sys.capital, 0)}</div>
      <div class="bar-bg" style="margin-top:6px"><div class="bar-fill" style="width:${Math.min(sys.exposure_pct,100)}%;background:${sys.exposure_pct > 80 ? 'var(--red)' : 'var(--blue)'}"></div></div>
    </div>
  `;

  // Bot cards
  $('#bot-cards').innerHTML = sumRes.bots.map(b => {
    const active = b.positions > 0 || b.total_trades > 0;
    return `<div class="card bot-card">
      <div class="status ${active ? 'active' : 'off'}"></div>
      <div class="bot-name">${b.name}</div>
      <div class="stat-row"><span class="label">Realized</span>${fmtPnl(b.realized)}</div>
      <div class="stat-row"><span class="label">Unrealized</span>${fmtPnl(b.unrealized)}</div>
      <div class="stat-row"><span class="label">Positions</span><span>${b.positions}</span></div>
      <div class="stat-row"><span class="label">Deployed</span><span>$${fmt(b.deployed)}</span></div>
      <div class="stat-row"><span class="label">Win Rate</span><span>${b.win_rate}% (${b.wins}W/${b.losses}L)</span></div>
      <div class="stat-row"><span class="label">Total Trades</span><span>${b.total_trades}</span></div>
    </div>`;
  }).join('');

  // P&L windows
  const bots = Object.keys(winRes.bots);
  const windows = winRes.windows;
  let whtml = `<div class="window-grid">`;
  whtml += `<div class="window-cell header">Bot</div>`;
  windows.forEach(w => { whtml += `<div class="window-cell header">Last ${w}h</div>`; });
  bots.forEach(bot => {
    whtml += `<div class="window-cell bot-label">${bot}</div>`;
    windows.forEach(w => {
      const v = winRes.bots[bot][w].realized;
      whtml += `<div class="window-cell"><span class="${pnlClass(v)}">${v >= 0 ? '+' : ''}$${fmt(Math.abs(v))}</span></div>`;
    });
  });
  // totals row
  whtml += `<div class="window-cell total">TOTAL</div>`;
  windows.forEach(w => {
    const tot = bots.reduce((s, b) => s + winRes.bots[b][w].realized, 0);
    whtml += `<div class="window-cell total"><span class="${pnlClass(tot)}">${tot >= 0 ? '+' : ''}$${fmt(Math.abs(tot))}</span></div>`;
  });
  whtml += `</div>`;
  $('#pnl-windows').innerHTML = whtml;

  // Entry windows
  let ehtml = `<div class="window-grid">`;
  ehtml += `<div class="window-cell header">Bot</div>`;
  windows.forEach(w => { ehtml += `<div class="window-cell header">Last ${w}h</div>`; });
  bots.forEach(bot => {
    ehtml += `<div class="window-cell bot-label">${bot}</div>`;
    windows.forEach(w => {
      ehtml += `<div class="window-cell">${winRes.bots[bot][w].entries}</div>`;
    });
  });
  ehtml += `</div>`;
  $('#entry-windows').innerHTML = ehtml;

  $('#last-updated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
}

// ─── Positions ───
let posBot = '';
$$('.pos-filter').forEach(btn => btn.addEventListener('click', () => {
  $$('.pos-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  posBot = btn.dataset.bot;
  loadPositions();
}));

async function loadPositions() {
  const url = posBot ? `${API}/api/positions?bot=${posBot}&limit=200` : `${API}/api/positions?limit=200`;
  const data = await fetch(url).then(r => r.json());
  const rows = data.positions;
  let html = `<table><thead><tr><th>Bot</th><th>Side</th><th>Size</th><th>Entry</th><th>Current</th><th>B/E</th><th>Net uPnL</th><th>Costs</th><th>Opened</th><th>Market</th></tr></thead><tbody>`;
  rows.forEach(p => {
    html += `<tr>
      <td>${p.bot}</td><td>${p.side}</td><td>${fmt(p.size,1)}</td>
      <td>${fmt(p.entry_price,4)}</td><td>${fmt(p.current_price,4)}</td>
      <td style="color:var(--muted)">${p.breakeven_price ? fmt(p.breakeven_price,4) : '—'}</td>
      <td>${fmtPnl(p.unrealized_pnl)}</td>
      <td style="color:var(--muted);font-size:12px">-$${fmt(p.entry_cost,2)}</td>
      <td style="color:var(--muted);font-size:12px">${fmtDate(p.opened_at)}</td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.question || ''}">${truncQ(p.question, 38)}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  if (!rows.length) html = `<div style="padding:20px;color:var(--muted);text-align:center">No open positions</div>`;
  $('#positions-table').innerHTML = html;
}

// ─── Trades ───
let tradeBot = '';
$$('.trade-filter').forEach(btn => btn.addEventListener('click', () => {
  $$('.trade-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tradeBot = btn.dataset.bot;
  loadTrades();
}));

async function loadTrades() {
  const url = tradeBot ? `${API}/api/trades?bot=${tradeBot}&hours=48&limit=100` : `${API}/api/trades?hours=48&limit=100`;
  const data = await fetch(url).then(r => r.json());
  let html = `<table><thead><tr><th>Time</th><th>Type</th><th>Bot</th><th>Side</th><th>Size</th><th>Price</th><th>P&L</th><th>Market</th></tr></thead><tbody>`;
  data.trades.forEach(t => {
    const badge = t.type === 'ENTRY' ? 'entry' : t.type === 'EXIT' ? 'exit' : 'resolution';
    html += `<tr>
      <td style="white-space:nowrap;font-size:12px">${fmtTime(t.time)}</td>
      <td><span class="badge ${badge}">${t.type}</span></td>
      <td>${t.bot}</td><td>${t.side || '—'}</td>
      <td>${fmt(t.size, 1)}</td><td>${fmt(t.price, 4)}</td>
      <td>${t.realized_pnl != null ? fmtPnl(t.realized_pnl) : '—'}</td>
      <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.question || ''}">${truncQ(t.question, 40)}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  if (!data.trades.length) html = `<div style="padding:20px;color:var(--muted);text-align:center">No trades in window</div>`;
  $('#trades-table').innerHTML = html;
}

// ─── Risk ───
async function loadRisk() {
  const data = await fetch(`${API}/api/risk`).then(r => r.json());
  const totalExp = data.by_bot.reduce((s, b) => s + b.exposure, 0);

  let html = `<h3>By Bot</h3>`;
  data.by_bot.forEach(b => {
    const pct = totalExp > 0 ? (b.exposure / totalExp * 100) : 0;
    html += `<div style="margin:8px 0">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span>${b.bot}</span><span>$${fmt(b.exposure)} (${b.count} pos)</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:var(--blue)"></div></div>
    </div>`;
  });
  $('#risk-by-bot').innerHTML = html;

  html = `<h3>By Category</h3>`;
  data.by_category.forEach(c => {
    const pct = totalExp > 0 ? (c.exposure / totalExp * 100) : 0;
    html += `<div style="margin:8px 0">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span>${c.category}</span><span>$${fmt(c.exposure)} (${c.count} pos)</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:var(--yellow)"></div></div>
    </div>`;
  });
  $('#risk-by-cat').innerHTML = html;

  html = `<table><thead><tr><th>Market</th><th>Bots</th><th>Exposure</th></tr></thead><tbody>`;
  data.concentrated.forEach(c => {
    html += `<tr><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${truncQ(c.question, 55)}</td>
      <td>${c.bots}</td><td>$${fmt(c.exposure)}</td></tr>`;
  });
  html += `</tbody></table>`;
  $('#risk-concentrated').innerHTML = html;
}

// ─── Snapshot Compare ───
function setPreset(p) {
  const today = new Date();
  const fmt_d = (d) => d.toISOString().split('T')[0];
  const end = fmt_d(today);
  let start;
  if (p === '7d') start = fmt_d(new Date(today - 7*86400000));
  else if (p === '30d') start = fmt_d(new Date(today - 30*86400000));
  else if (p === 'mtd') start = fmt_d(new Date(today.getFullYear(), today.getMonth(), 1));
  else start = '2026-01-01';  // all time
  $('#compare-start').value = start;
  $('#compare-end').value = end;
  loadCompare();
}

async function loadCompare() {
  const s = $('#compare-start').value;
  const e = $('#compare-end').value;
  if (!s || !e) { $('#compare-result').innerHTML = '<div class="loading">Pick both dates</div>'; return; }
  const data = await fetch(`${API}/api/snapshot_compare?start=${s}&end=${e}`).then(r => r.json());

  const ss = data.snapshots[s] || {};
  const se = data.snapshots[e] || {};
  const allBots = [...new Set([...Object.keys(ss), ...Object.keys(se)])];

  if (!allBots.length) {
    $('#compare-result').innerHTML = '<div class="loading">No snapshot data for these dates. equity_snapshots may not have rows yet.</div>';
    return;
  }

  // Aggregate
  const agg = (obj, key) => Object.values(obj).reduce((s, b) => s + (b[key] || 0), 0);
  const metrics = ['equity', 'realized', 'unrealized', 'deployed', 'positions'];
  const labels = ['Total Equity', 'Realized P&L', 'Unrealized', 'Deployed', 'Positions'];

  let html = `<h3 style="margin-bottom:12px">Period: ${s} to ${e}</h3>`;
  html += `<table><thead><tr><th>Metric</th><th>Start</th><th>End</th><th>Delta</th></tr></thead><tbody>`;
  metrics.forEach((m, i) => {
    const sv = agg(ss, m);
    const ev = agg(se, m);
    const delta = ev - sv;
    const isDollar = m !== 'positions';
    html += `<tr><td style="font-weight:600">${labels[i]}</td>
      <td>${isDollar ? '$' + fmt(sv) : sv}</td>
      <td>${isDollar ? '$' + fmt(ev) : ev}</td>
      <td>${isDollar ? fmtPnl(delta) : (delta >= 0 ? '+' : '') + delta}</td></tr>`;
  });
  html += `</tbody></table>`;

  // Per-bot trades in period
  if (Object.keys(data.period_trades).length) {
    html += `<h3 style="margin:16px 0 8px">Trades in Period</h3>`;
    html += `<table><thead><tr><th>Bot</th><th>Trades</th><th>Wins</th><th>Losses</th><th>Net P&L</th></tr></thead><tbody>`;
    Object.entries(data.period_trades).forEach(([bot, d]) => {
      html += `<tr><td>${bot}</td><td>${d.trades}</td><td>${d.wins}</td><td>${d.losses}</td><td>${fmtPnl(d.net)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }

  $('#compare-result').innerHTML = html;
}

// ─── Init ───
loadCommand();
