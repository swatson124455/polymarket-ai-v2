version: '3.8'

# SECURITY: Set POSTGRES_PASSWORD in .env file (never use default in production)
# SECURITY: Set REDIS_PASSWORD in .env file for authenticated Redis

services:
  app:
    build: .
    container_name: polymarket-ai-v2
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    ports:
      - "8501:8501"  # Streamlit
      - "8000:8000"  # FastAPI (if used)
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/polymarket
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    # Security: drop all capabilities, add only what's needed
    cap_drop:
      - ALL
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    container_name: polymarket-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: polymarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d/migrations:ro
    # SECURITY: Only bind to localhost — not exposed to network
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymarket"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: polymarket-redis
    # SECURITY: require password when REDIS_PASSWORD is set
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass "$REDIS_PASSWORD"
        else
          redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
        fi
      '
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    # SECURITY: Only bind to localhost
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  backend:
    driver: bridge
    internal: false  # set to true if app doesn't need outbound internet (it does for Polymarket API)

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
