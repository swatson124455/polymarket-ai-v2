[pytest]
# Pytest Configuration
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=base_engine
    --cov=bots
    --cov-report=term-missing
    --cov-fail-under=0
filterwarnings =
    # websockets.legacy DeprecationWarning fires if websockets.legacy is imported (deprecated since v14).
    # Our code does NOT use websockets.legacy (migrated in Session 37). Filter retained as safety net
    # in case any transitive dependency triggers it.
    ignore::DeprecationWarning:websockets
    # LightGBM auto-generates feature names for numpy arrays; production code suppresses this too
    ignore:X does not have valid feature names:UserWarning
    # structlog default processor chain includes StackInfoRenderer + ConsoleRenderer; our production
    # config removes StackInfoRenderer (main.py) but conftest configure runs after module import caching
    ignore:Remove `format_exc_info` from your processor chain:UserWarning
    # asyncpg + pytest-asyncio: per-test event loops close before asyncpg pool GC runs,
    # leaving transports/connections in CLOSE_WAIT. Tests pass correctly; these are teardown artifacts.
    ignore:.*unclosed.*socket.*:ResourceWarning
    ignore:.*unclosed transport.*:ResourceWarning
    ignore:.*unclosed connection.*asyncpg.*:ResourceWarning
    ignore:.*unclosed.*_ProactorSocketTransport.*:ResourceWarning
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (multiple components)
    benchmark: Performance benchmarks
    slow: Slow tests (skip in CI)
